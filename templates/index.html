<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 Todo 리스트</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<div class="todo-container">
    <div class="header">
        <h1>My Todo List</h1>
        <div class="user-info">
            <span><strong>{{ session['username'] }}</strong> 님</span>
            <button class="btn-logout" onclick="location.href='/logout'">로그아웃</button>
        </div>
    </div>

    <form class="todo-form" id="todoForm">
    <input type="text" id="todoInput" placeholder="할 일을 입력하세요..." required>
    <button type="submit" class="btn-add">추가</button>
</form>

<div class="filter-bar">
    <button class="btn-filter active" data-filter="all">전체 보기</button>
    <button class="btn-filter" data-filter="active">진행 중</button>
    <button class="btn-filter" data-filter="completed">완료됨</button>
</div>

<ul class="todo-list" id="todoList">
    </ul>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
